name: Build Rust External Cheat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Build Solution
      run: msbuild RustExternal.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cheat
        path: x64/Release/RustExternal.exe
